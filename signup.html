<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | PhishGuard</title>

  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="logo">Phish<span>Guard</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
  </ul>
</nav>

<section class="auth-container">
  <div class="auth-card">
    <h1>Create Account</h1>
    <p>Join PhishGuard to stay protected</p>

    <input type="text" id="signupUsername" placeholder="Full name" />
    <input type="email" id="signupEmail" placeholder="Email address" />
    <input type="password" id="signupPassword" placeholder="Password" />

    <button class="btn-primary auth-btn" onclick="signupUser()">Sign Up</button>
    <p class="auth-footer">
      Already have an account?
      <a href="login.html">Login</a>
    </p>
  </div>
</section>

<script src="script.js"></script>

</body>
</html>
